apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: logllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: YOUR_DOCKERHUB_USERNAME/logllm-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: logllm-secrets
                  key: ANTHROPIC_API_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: logllm-secrets
                  key: GEMINI_API_KEY
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: logllm-secrets
                  key: MONGODB_URI
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: logllm-secrets
                  key: REDIS_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /graphql
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: logllm
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
